<section id="pg-finance" class="page-content">
  <div class="page-bar">
    <div class="filter-tabs" id="finFilters">
      <button class="ftab active" onclick="Pages.finance.filter('all',this)">All</button>
      <button class="ftab" onclick="Pages.finance.filter('income',this)">Income</button>
      <button class="ftab" onclick="Pages.finance.filter('expense',this)">Expense</button>
    </div>
    <button class="btn-primary" onclick="Modals.newTransaction()">+ Transaction</button>
  </div>
  <div class="finance-summary" id="financeSummary"></div>
  <div class="card">
    <table class="data-table">
      <thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th><th>Actions</th></tr></thead>
      <tbody id="financeBody"></tbody>
    </table>
  </div>
</section>
