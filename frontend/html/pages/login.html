<!-- ═══════════════════════════════════════════════════════ LOGIN -->
<div id="loginScreen" class="screen active">
  <div class="login-bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="teeth-anim">
      <svg viewBox="0 0 200 80" class="teeth-svg">
        <g class="tooth" style="--i:0"><rect x="5"  y="20" width="22" height="50" rx="8"/></g>
        <g class="tooth" style="--i:1"><rect x="32" y="10" width="22" height="60" rx="8"/></g>
        <g class="tooth" style="--i:2"><rect x="59" y="5"  width="22" height="65" rx="8"/></g>
        <g class="tooth" style="--i:3"><rect x="86" y="5"  width="22" height="65" rx="8"/></g>
        <g class="tooth" style="--i:4"><rect x="113"y="10" width="22" height="60" rx="8"/></g>
        <g class="tooth" style="--i:5"><rect x="140"y="20" width="22" height="50" rx="8"/></g>
        <g class="tooth" style="--i:6"><rect x="167"y="28" width="22" height="42" rx="8"/></g>
      </svg>
    </div>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-icon">🦷</div>
      <h1>DentCare<span>Pro</span></h1>
      <p>Advanced Dental Management System</p>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label>Username</label>
        <select id="loginUser" class="login-select">
          <option value="">— Select your username —</option>
        </select>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="Enter password">
      </div>
      <div id="loginErr" class="login-error hidden">Invalid credentials</div>
      <button class="btn-login" onclick="App.login()">Access System →</button>
      <div class="forgot-pw-wrap">
        <button class="btn-forgot" onclick="App.forgotPassword()">🔒 Forgot Password?</button>
      </div>
    </div>
  </div>
</div>
