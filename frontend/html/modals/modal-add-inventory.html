<!-- ═══════════════════════════════════════════════════════ MODAL: ADD INVENTORY -->
<div id="modalAddInv" class="modal modal-sm" style="display:none">
  <div class="modal-head"><h3>📦 Add Inventory Item</h3><button class="close-btn" onclick="Modals.close()">×</button></div>
  <div class="modal-body">
    <div class="form-grid">
      <div class="form-group full"><label>Item Name *</label><input id="inv_name" placeholder="Item name"></div>
      <div class="form-group full"><label>Category</label><select id="inv_cat"><option value="consumable">Consumable</option><option value="equipment">Equipment</option><option value="medication">Medication</option><option value="material">Material</option></select></div>
      <div class="form-group"><label>Quantity *</label><input id="inv_qty" type="number" placeholder="0"></div>
      <div class="form-group"><label>Min Stock Level</label><input id="inv_min" type="number" placeholder="5"></div>
      <div class="form-group"><label>Unit Price (E£)</label><input id="inv_price" type="number" placeholder="0.00"></div>
      <div class="form-group"><label>Supplier</label><input id="inv_supplier" placeholder="Supplier name"></div>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn-ghost" onclick="Modals.close()">Cancel</button>
    <button class="btn-primary" onclick="Actions.addInventoryItem()">✓ Add Item</button>
  </div>
</div>
