<!-- ═══════════════════════════════════════════════════════ MODAL: ADD DOCTOR -->
<div id="modalAddDoctor" class="modal" style="display:none">
  <div class="modal-head"><h3>⚕️ Add Doctor</h3><button class="close-btn" onclick="Modals.close()">×</button></div>
  <div class="modal-body">
    <div class="form-grid">
      <div class="form-group full"><label>Full Name *</label><input id="dr_name" placeholder="Dr. Full Name"></div>
      <div class="form-group full"><label>Specialty *</label><select id="dr_spec"><option value="">Select…</option><option>General Dentistry</option><option>Orthodontics</option><option>Endodontics</option><option>Periodontics</option><option>Oral Surgery</option><option>Prosthodontics</option><option>Pediatric Dentistry</option></select></div>
      <div class="form-group"><label>Phone</label><input id="dr_phone" placeholder="Phone number"></div>
      <div class="form-group"><label>Email</label><input id="dr_email" type="email" placeholder="Email"></div>
      <div class="form-group"><label>License #</label><input id="dr_lic" placeholder="License number"></div>
      <div class="form-group"><label>Room</label><input id="dr_room" placeholder="e.g. Room 3"></div>
      <div class="form-group full"><label>Schedule</label><input id="dr_sched" placeholder="e.g. Sun-Thu 9AM-5PM"></div>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn-ghost" onclick="Modals.close()">Cancel</button>
    <button class="btn-primary" onclick="Actions.addDoctor()">✓ Add Doctor</button>
  </div>
</div>
