<!-- ═══════════════════════════════════════════════════════ MODAL: NEW PATIENT -->
<div id="modalNewPatient" class="modal" style="display:none">
  <div class="modal-head"><h3>🦷 Register New Patient</h3><button class="close-btn" onclick="Modals.close()">×</button></div>
  <div class="modal-body">
    <!-- Tab Bar -->
    <div class="np-tabs">
      <button class="np-tab active" onclick="Modals._npTab('info',this)">👤 Patient Info</button>
      <button class="np-tab" onclick="Modals._npTab('xray',this)">🩻 X-Ray Upload</button>
    </div>

    <!-- Tab: Info -->
    <div id="npTabInfo" class="np-tab-panel active">
      <div class="form-grid">
        <div class="form-group"><label>Full Name *</label><input id="np_name" placeholder="Patient full name"></div>
        <div class="form-group"><label>Phone *</label><input id="np_phone" placeholder="Phone number"></div>
        <div class="form-group"><label>Date of Birth</label><input id="np_dob" type="date"></div>
        <div class="form-group"><label>Gender</label><select id="np_gender"><option value="">Select</option><option value="male">Male</option><option value="female">Female</option><option value="other">Other</option></select></div>
        <div class="form-group"><label>Email</label><input id="np_email" type="email" placeholder="Email address"></div>
        <div class="form-group"><label>Occupation</label><input id="np_occupation" placeholder="Job title"></div>
        <div class="form-group"><label>Blood Type</label><select id="np_blood"><option value="">Unknown</option><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>AB+</option><option>AB-</option><option>O+</option><option>O-</option></select></div>
        <div class="form-group"><label>Insurance</label><input id="np_insurance" placeholder="Insurance provider"></div>
        <div class="form-group"><label>Referral Source</label><select id="np_ref"><option value="">Select</option><option>Google</option><option>Social Media</option><option>Friend/Family</option><option>Doctor Referral</option><option>Walk-in</option></select></div>
        <div class="form-group"><label>Payment Method</label><select id="np_pay"><option value="cash">Cash</option><option value="card">Card</option><option value="insurance">Insurance</option><option value="installment">Installment</option></select></div>
        <div class="form-group full"><label>Medical Conditions</label><input id="np_conditions" placeholder="e.g. Diabetes, Hypertension"></div>
        <div class="form-group full"><label>Allergies</label><input id="np_allergies" placeholder="e.g. Penicillin, Latex"></div>
        <div class="form-group full"><label>Dental Concerns</label><input id="np_concerns" placeholder="Main dental concerns"></div>
        <div class="form-group full"><label>Address</label><input id="np_address" placeholder="Home address"></div>
      </div>
    </div>

    <!-- Tab: X-Ray -->
    <div id="npTabXray" class="np-tab-panel" style="display:none">
      <div class="xray-upload-area" id="xrayDropZone"
           onclick="document.getElementById('xrayFileInp').click()"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="event.preventDefault();this.classList.remove('drag-over');Modals._handleXrayDrop(event)">
        <div id="xrayPreviewWrap" style="display:none">
          <img id="xrayPreviewImg" style="max-width:100%;max-height:320px;border-radius:8px;object-fit:contain">
          <div class="xray-remove-btn" onclick="event.stopPropagation();Modals._clearXray()">✕ Remove</div>
        </div>
        <div id="xrayUploadPrompt">
          <div style="font-size:3rem">🩻</div>
          <p style="color:var(--text2);margin:.5rem 0">Click or drag &amp; drop X-ray image here</p>
          <small style="color:var(--text-muted,var(--text2))">Supports JPG, PNG, WEBP — saved to patients.json</small>
        </div>
      </div>
      <input type="file" id="xrayFileInp" accept="image/*" style="display:none" onchange="Modals._handleXrayFile(this)">
      <div class="form-grid" style="margin-top:1rem">
        <div class="form-group"><label>X-Ray Date</label><input type="date" id="np_xray_date" value="${new Date().toISOString().split('T')[0]}"></div>
        <div class="form-group"><label>X-Ray Notes</label><input type="text" id="np_xray_notes" placeholder="e.g. Panoramic, Bitewing..."></div>
      </div>
    </div>
  </div>
  <div class="modal-foot">
    <button class="btn-ghost" onclick="Modals.close()">Cancel</button>
    <button class="btn-primary" onclick="Actions.registerPatient()">✓ Register Patient</button>
  </div>
</div>
